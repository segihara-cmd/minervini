name: Daily Dashboard Update

on:
  push:
    branches: [main]
    paths:
      - 'generate_dashboard.py'
      - 'api/**'
      - 'docs/dashboard-app.js'
      - 'docs/screener-app.js'
      - 'api/**'
      - '.github/workflows/dashboard.yml'
  schedule:
    - cron: '0/30 * * * 1-5'   # 평일 30분마다 (KST 장중·장후 스냅샷 갱신)
    - cron: '0 23 * * 0-4'     # 평일 오전 8시 KST
    - cron: '0 8 * * 1-5'      # 평일 오후 5시 KST
  workflow_dispatch:           # 수동 실행 버튼

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Generate dashboard HTML
        run: python generate_dashboard.py

      - name: Generate ETF screener HTML
        run: python generate_screener.py

      - name: Commit and push docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/data.json docs/dashboard-app.js docs/config.json docs/screener.html docs/screener.json docs/screener-app.js
          git diff --staged --quiet || git commit -m "chore: dashboard update $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
          git push
